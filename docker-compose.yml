version: '3.8'

services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube-server
    depends_on:
      - db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    networks:
      - sonar_net
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: sonarqube_db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
    volumes:
      - postgresql:/var/lib/postgresql
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - sonar_net
    restart: unless-stopped

  webapp:
    image: kuberoose/automated-sast-portal:latest
    container_name: sonar_webapp
    ports:
      - "8000:8000"
    environment:
      # This is the internal password your app will auto-configure
      - SONAR_PASSWORD=Sonar_Internal_Auth_123!
    volumes:
      # Exposes Windows Docker Desktop daemon to the container
      - /var/run/docker.sock:/var/run/docker.sock
      # The shared volume where code is extracted
      - scan_data:/app/scans
    networks:
      - sonar_net
    depends_on:
      - sonarqube

networks:
  sonar_net:
    driver: bridge
    name: sonar_net

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:
  postgresql_data:
  scan_data: 
    name: scan_data